font=Google Sans Flex:weight=medium:size=14,JetBrainsMono Nerd Font:size=14,Noto Sans CJK SC:size=14
terminal=kitty -1

prompt="      "
placeholder="搜索应用..."
icons-enabled=yes
icon-theme=Papirus-Dark

fields=filename,name,generic,exec,keywords
match-mode=fzf
sort-result=yes
filter-desktop=no

anchor=top
y-margin=70

lines=6
width=60
horizontal-pad=40
vertical-pad=18
inner-pad=12
line-height=30
image-size-ratio=0.55

layer=overlay
hide-before-typing=no

[colors]
background=101820f2
text=eaf3f5ff
input=eaf3f5ff
prompt=8ed8e6ff
placeholder=8398a1ff

match=8ed8e6ff
selection=20303af2
selection-text=ffffffff
selection-match=bceff7ff

border=6fb6c4ee

[border]
radius=17
width=1

[dmenu]
exit-immediately-if-empty=yes

[key-bindings]
cancel=Control+g Control+c Escape
