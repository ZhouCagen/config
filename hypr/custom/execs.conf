# hyprlang noerror false
# =========================================================
# Hyprland 自启动配置
# =========================================================
# 这个文件专门放 Hyprland 启动时需要自动运行的程序。
#
# exec-once = 程序
#   表示 Hyprland 启动时只执行一次。
#   适合放输入法、壁纸、状态栏、通知、剪贴板、代理软件等后台服务。
#
# exec = 程序
#   表示每次 hyprctl reload 时也可能重新执行。
#   普通自启动不建议用 exec，容易重复启动多个进程。
#
# 官方文档：
# https://wiki.hyprland.org/Configuring/Keywords/#executing


# =========================================================
# 输入法
# =========================================================

# 启动 Fcitx5 输入法后台服务。
# -d 表示以 daemon 后台模式运行。
# 中文输入法基本必须启动这个。
exec-once = fcitx5 -d


# =========================================================
# 动态壁纸
# =========================================================

# 启动 linux-wallpaperengine，加载 Steam Wallpaper Engine 创意工坊壁纸。
#
# --scaling fill
#   壁纸按填充方式缩放，尽量铺满屏幕。
#
# --screen-root eDP-1
#   指定作用屏幕为 eDP-1，一般是笔记本内置屏幕。
#
# --bg 后面是 Wallpaper Engine 创意工坊内容路径。
#
# --silent
#   静默启动，减少终端输出。
#
# --fps 15
#   限制壁纸帧率为 15，比较省电。
exec-once = linux-wallpaperengine --scaling fill --screen-root eDP-1 --bg /home/zhoukaijun/.local/share/Steam/steamapps/workshop/content/431960/2282120494 --silent --fps 15


# =========================================================
# X11 / XWayland 兼容配置
# =========================================================

# 读取 ~/.Xresources 配置。
# 一些 X11 / XWayland 程序会读取这里面的字体、DPI、颜色等设置。
exec-once = xrdb -merge ~/.Xresources

# 启动 xsettingsd。
# 它会给部分 GTK / XWayland 程序提供主题、字体、DPI 等设置。
# 如果某些老软件主题不对、字体不对，通常和这个有关。
exec-once = xsettingsd


# =========================================================
# 网络代理 / Clash
# =========================================================

# 延迟 8 秒后启动 FlClash。
#
# 使用 sh -c 是为了执行复合命令：
#   sleep 8; /usr/bin/flclash >/tmp/flclash.log 2>&1
#
# sleep 8
#   等桌面环境、网络服务基本启动完成后再打开 FlClash。
#
# >/tmp/flclash.log 2>&1
#   把标准输出和错误输出都写进 /tmp/flclash.log，方便排查启动问题。
exec-once = sh -c 'sleep 8; /usr/bin/flclash >/tmp/flclash.log 2>&1'


# =========================================================
# 罗技设备管理
# =========================================================

# 启动 Solaar，用于管理罗技无线鼠标、键盘、接收器等设备。
#
# -w hide
#   启动后隐藏窗口，只保留后台/托盘。
exec-once = solaar -w hide


# =========================================================
# 显示器自动布局，可选
# =========================================================

# kanshi 用于自动切换显示器布局。
# 比如插上外接显示器时自动切换分辨率、位置、刷新率。
#
# 如果你之后要经常外接显示器，可以取消注释：
# exec-once = kanshi
