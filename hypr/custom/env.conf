# hyprlang noerror false

# ==========================================
# --- 用户自定义环境变量 ---
# ==========================================
# 你可以把额外的环境变量写在这里
# Hyprland 环境变量文档：
# https://wiki.hyprland.org/Configuring/Environment-variables/

# ==========================================
# --- 输入法 Fcitx5 ---
# ==========================================
# 这里配置 Fcitx5 中文输入法
# 作用：让 Wayland / Hyprland 下的程序能正常调用输入法
# 包括 QT、GTK、SDL 程序，以及部分 XWayland 程序

env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
env = INPUT_METHOD,fcitx

# Wayland 下 GTK 程序优先使用原生 Wayland 输入法前端
# 不全局设置 GTK_IM_MODULE，避免 Fcitx5 启动时弹推荐提示
# env = GTK_IM_MODULE,fcitx

# 如果某些 GLFW 程序或游戏里输入法不正常，可以取消下面这行的注释
# env = GLFW_IM_MODULE,ibus

# ==========================================
# --- Wayland 相关 ---
# ==========================================
# 如果遇到 Electron / Chromium 应用闪屏或撕裂问题，可以尝试取消下面这行注释
# env = WLR_DRM_NO_ATOMIC,1

# 如果遇到硬件光标显示异常，可以尝试取消下面这行注释
# env = WLR_NO_HARDWARE_CURSORS,1

# ==========================================
# --- 默认编辑器 ---
# ==========================================
# 设置终端默认编辑器为 Vim
env = EDITOR,vim
